<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portafolio de Fotos</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #020805;
      --text: #f4fff8;
      --muted: #a8c7b5;
      --neon: #39ff88;
      --neon-soft: rgba(57, 255, 136, 0.28);
      --neon-faint: rgba(57, 255, 136, 0.11);
      --glass: rgba(7, 32, 19, 0.48);
      --glass-strong: rgba(57, 255, 136, 0.18);
      --border: rgba(57, 255, 136, 0.32);
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 18%, rgba(57, 255, 136, 0.24), transparent 30%),
        radial-gradient(circle at 82% 72%, rgba(0, 255, 190, 0.18), transparent 34%),
        radial-gradient(circle at 50% 105%, rgba(120, 255, 90, 0.13), transparent 38%),
        linear-gradient(135deg, #020805 0%, #03140b 42%, #061006 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(57, 255, 136, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57, 255, 136, 0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black, transparent 72%);
      opacity: 0.55;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      pointer-events: none;
      background: conic-gradient(from 140deg, transparent, rgba(57, 255, 136, 0.09), transparent, rgba(0, 255, 190, 0.07), transparent);
      filter: blur(42px);
      opacity: 0.75;
      animation: ambientGlow 14s linear infinite;
      z-index: 0;
    }

    @keyframes ambientGlow {
      from {
        transform: rotate(0deg) scale(1.05);
      }
      to {
        transform: rotate(360deg) scale(1.05);
      }
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 22px clamp(18px, 4vw, 56px);
      text-align: center;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .brand h1 {
      font-size: clamp(1.35rem, 3vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      text-shadow: 0 0 18px rgba(57, 255, 136, 0.42);
    }

    .brand p {
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .counter {
      position: absolute;
      right: clamp(18px, 4vw, 56px);
      top: 50%;
      transform: translateY(-50%);
      min-width: 84px;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--glass);
      backdrop-filter: blur(18px);
      text-align: center;
      font-size: 0.95rem;
      color: var(--text);
    }

    .slider {
      position: relative;
      width: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 clamp(14px, 4vw, 56px);
    }

    .photo-frame {
      position: relative;
      width: min(92vw, 520px);
      height: min(74vh, 820px);
      aspect-ratio: 9 / 16;
      border-radius: clamp(18px, 3vw, 34px);
      overflow: hidden;
      background: #031008;
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.72),
        0 0 46px rgba(57, 255, 136, 0.18);
      border: 1px solid var(--border);
    }

    .photo-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      box-shadow: inset 0 -140px 120px rgba(0, 0, 0, 0.35);
    }

    .photo-frame::before {
      content: "Clic para ampliar";
      position: absolute;
      left: 50%;
      bottom: 82px;
      z-index: 7;
      transform: translateX(-50%) translateY(12px);
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(14px);
      color: var(--text);
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 0 24px rgba(57, 255, 136, 0.22);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .photo-frame:hover::before {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .photo-frame:hover {
      box-shadow:
        0 28px 90px rgba(0, 0, 0, 0.78),
        0 0 70px rgba(57, 255, 136, 0.34);
    }

    .photo-frame:hover .slide.active {
      transform: scale(1.045);
      filter: brightness(1.08) saturate(1.08);
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      background: #080808;
      opacity: 0;
      transform: scale(1.015);
      transition: opacity 0.45s ease, transform 0.45s ease;
      user-select: none;
      -webkit-user-drag: none;
      cursor: pointer;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
    }

    .controls {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      padding: 0 clamp(18px, 5vw, 72px);
    }

    .nav-button {
      pointer-events: auto;
      width: clamp(46px, 5vw, 62px);
      height: clamp(46px, 5vw, 62px);
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--glass);
      backdrop-filter: blur(18px);
      color: white;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .nav-button:hover {
      transform: scale(1.06);
      background: var(--glass-strong);
    }

    .dots {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      max-width: min(88vw, 720px);
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(16px);
    }

    .dot {
      width: 8px;
      height: 8px;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.35);
      cursor: pointer;
      transition: width 0.25s ease, background 0.25s ease;
    }

    .dot.active {
      width: 26px;
      background: var(--neon);
      box-shadow: 0 0 12px var(--neon-soft);
    }

    .footer {
      position: relative;
      z-index: 10;
      padding: 18px clamp(18px, 4vw, 56px) 24px;
      color: var(--muted);
      font-size: 0.88rem;
      text-align: center;
    }

    .fullscreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(14px);
    }

    .fullscreen.active {
      display: flex;
    }

    .fullscreen img {
      max-width: 94vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 18px;
      box-shadow:
        0 28px 90px rgba(0, 0, 0, 0.85),
        0 0 52px rgba(57, 255, 136, 0.24);
      border: 1px solid var(--border);
    }

    .fullscreen-close {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 101;
      width: 48px;
      height: 48px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--glass);
      backdrop-filter: blur(18px);
      color: white;
      font-size: 30px;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .fullscreen-close:hover {
      transform: scale(1.06);
      background: var(--glass-strong);
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
      padding: 24px;
    }

    @media (max-width: 720px) {
      body {
        overflow: hidden;
      }

      .header {
        align-items: flex-start;
        padding-top: 18px;
      }

      .brand h1 {
        max-width: 100%;
      }

      .counter {
        position: static;
        transform: none;
        margin-top: 8px;
      }

      .header {
        flex-direction: column;
        gap: 10px;
      }

      .photo-frame {
        width: min(92vw, 430px);
        height: 70vh;
        border-radius: 22px;
      }

      .controls {
        padding: 0 20px;
      }

      .nav-button {
        background: rgba(0, 0, 0, 0.28);
      }

      .dots {
        bottom: 16px;
        gap: 5px;
        padding: 8px 10px;
      }

      .dot {
        width: 6px;
        height: 6px;
      }

      .dot.active {
        width: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">
        <h1>Christian Camilo Lancheros Sanchez</h1>
        <p>Portafolio Fotográfico 2026</p>
      </div>

      <div class="counter" id="counter">1/18</div>
    </header>

    <main class="slider" id="slider">
      <section class="photo-frame" id="photoFrame">
        <p class="loading" id="loading">Cargando fotos...</p>

        <div class="dots" id="dots"></div>
      </section>

      <div class="controls">
        <button class="nav-button" id="prev" aria-label="Foto anterior">&#8249;</button>
        <button class="nav-button" id="next" aria-label="Foto siguiente">&#8250;</button>
      </div>
    </main>

    <footer class="footer">
      © 2026 CCLS. Todos los derechos reservados.
    </footer>
  </div>

  <div class="fullscreen" id="fullscreen">
    <button class="fullscreen-close" id="fullscreenClose" aria-label="Cerrar foto ampliada">&times;</button>
    <img id="fullscreenImage" src="" alt="Foto ampliada" />
  </div>

  <script>
    const counter = document.getElementById('counter');
    const prevButton = document.getElementById('prev');
    const nextButton = document.getElementById('next');
    const dotsContainer = document.getElementById('dots');
    const photoFrame = document.getElementById('photoFrame');
    const fullscreen = document.getElementById('fullscreen');
    const fullscreenImage = document.getElementById('fullscreenImage');
    const fullscreenClose = document.getElementById('fullscreenClose');
    const loading = document.getElementById('loading');

    const CONFIG = {
      githubUser: 'Rocnarx',
      githubRepo: 'college-portfolio',
      photosFolder: 'photos'
    };

    let slides = [];
    let dots = [];
    let currentIndex = 0;
    let touchStartX = 0;
    let touchEndX = 0;

    function getRepoInfo() {
      const hostUser = window.location.hostname.split('.')[0];
      const repoFromPath = window.location.pathname.split('/').filter(Boolean)[0];

      return {
        user: CONFIG.githubUser || hostUser,
        repo: CONFIG.githubRepo || repoFromPath || `${hostUser}.github.io`
      };
    }

    function isPhoto(fileName) {
      return /\.(jpe?g|png|webp|gif)$/i.test(fileName);
    }

    function sortPhotos(a, b) {
      return a.name.localeCompare(b.name, undefined, {
        numeric: true,
        sensitivity: 'base'
      });
    }

    async function loadPhotos() {
      const { user, repo } = getRepoInfo();
      const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/${CONFIG.photosFolder}`;

      try {
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error('No se pudo leer la carpeta de fotos.');

        const files = await response.json();
        const photos = files
          .filter((file) => file.type === 'file' && isPhoto(file.name))
          .sort(sortPhotos);

        if (!photos.length) {
          loading.textContent = 'No se encontraron fotos en la carpeta photos.';
          counter.textContent = '0/0';
          return;
        }

        loading.remove();

        photos.forEach((photo, index) => {
          const img = document.createElement('img');
          img.className = `slide${index === 0 ? ' active' : ''}`;
          img.src = photo.download_url;
          img.alt = `Foto ${index + 1}`;
          photoFrame.insertBefore(img, dotsContainer);

          const dot = document.createElement('button');
          dot.className = `dot${index === 0 ? ' active' : ''}`;
          dot.setAttribute('aria-label', `Ir a la foto ${index + 1}`);
          dot.addEventListener('click', () => showSlide(index));
          dotsContainer.appendChild(dot);
        });

        slides = Array.from(document.querySelectorAll('.slide'));
        dots = Array.from(document.querySelectorAll('.dot'));
        showSlide(0);
      } catch (error) {
        loading.textContent = 'No se pudieron cargar las fotos. Revisa el nombre del repositorio y la carpeta photos.';
        counter.textContent = '0/0';
        console.error(error);
      }
    }

    function showSlide(index) {
      if (!slides.length || !dots.length) return;

      if (slides[currentIndex]) slides[currentIndex].classList.remove('active');
      if (dots[currentIndex]) dots[currentIndex].classList.remove('active');

      currentIndex = (index + slides.length) % slides.length;

      slides[currentIndex].classList.add('active');
      dots[currentIndex].classList.add('active');
      counter.textContent = `${currentIndex + 1}/${slides.length}`;

      if (fullscreen.classList.contains('active')) {
        fullscreenImage.src = slides[currentIndex].src;
      }
    }

    function showPrevious() {
      showSlide(currentIndex - 1);
    }

    function showNext() {
      showSlide(currentIndex + 1);
    }

    function openFullscreen() {
      fullscreenImage.src = slides[currentIndex].src;
      fullscreen.classList.add('active');
    }

    function closeFullscreen() {
      fullscreen.classList.remove('active');
      fullscreenImage.src = '';
    }

    prevButton.addEventListener('click', showPrevious);
    nextButton.addEventListener('click', showNext);

    photoFrame.addEventListener('click', (event) => {
      if (event.target.classList.contains('slide')) openFullscreen();
    });

    fullscreenClose.addEventListener('click', closeFullscreen);

    fullscreen.addEventListener('click', (event) => {
      if (event.target === fullscreen) closeFullscreen();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeFullscreen();
      if (event.key === 'ArrowLeft') showPrevious();
      if (event.key === 'ArrowRight') showNext();
    });

    photoFrame.addEventListener('touchstart', (event) => {
      touchStartX = event.changedTouches[0].screenX;
    });

    photoFrame.addEventListener('touchend', (event) => {
      touchEndX = event.changedTouches[0].screenX;
      handleSwipe();
    });

    function handleSwipe() {
      const distance = touchStartX - touchEndX;

      if (Math.abs(distance) < 50) return;
      if (distance > 0) showNext();
      else showPrevious();
    }

    loadPhotos();
  </script>
</body>
</html>
